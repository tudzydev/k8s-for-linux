apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: production
  annotations:
    cert-namager.io/cluster-issuer: letsencrypt-pord
    nginx.ingress.hubernetes.io/ssl-redirect: "false"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app

  template:
    metadata:
      labels:
        app: demo-app

    spec:
      containers:
      - name: nginx
        image: nginx:latest

        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: demo-service
  namespace: production

spec:
  selector:
    app: demo-app

  ports:
  - port: 80
    targetPort: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: production

  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

spec:
  ingressClassName: nginx

  tls:
  - hosts:
    - demo.192.168.1.136.nip.io
    secretName: demo-tls

  rules:
  - host: demo.192.168.1.136.nip.io

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: demo-service
            port:
              number: 80

